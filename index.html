<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Chart Maker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* Base Colors */
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.75);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --page-bg: linear-gradient(135deg, #020617 0%, #172554 100%);
            --nav-bg: rgba(15, 23, 42, 0.4);

            /* Overlays (mostly semantic for dark/light) */
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
            --glass-bg-hover: rgba(255, 255, 255, 0.06);
            --glass-border-hover: rgba(255, 255, 255, 0.1);

            --input-bg: rgba(0, 0, 0, 0.2);
            --input-border: rgba(255, 255, 255, 0.08);
            --input-bg-hover: rgba(0, 0, 0, 0.4);
            --input-border-hover: rgba(255, 255, 255, 0.3);
            --input-bg-focus: rgba(0, 0, 0, 0.5);

            --btn-ghost-bg: rgba(255, 255, 255, 0.05);
            --btn-ghost-border: rgba(255, 255, 255, 0.1);
            --btn-ghost-hover: rgba(255, 255, 255, 0.1);
            --btn-ghost-hover-border: rgba(255, 255, 255, 0.2);

            --title-grad-start: #fff;
            --title-grad-end: #93c5fd;

            --modal-bg-grad: linear-gradient(135deg, #1e293b, #0f172a);
            --modal-overlay: rgba(0, 0, 0, 0.6);
            --shadow-color: rgba(0, 0, 0, 0.2);
            --grid-line-color: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.1);
            --scrollbar-thumb: rgba(255, 255, 255, 0.2);
            --scrollbar-thumb-hover: rgba(255, 255, 255, 0.3);

            /* Primary Colors */
            --primary-blue: #1d4ed8;
            --primary-green: #047857;
            --primary-orange: #c2410c;
            --primary-pink: #be185d;
            --primary-purple: #6d28d9;
            --primary-red: #b91c1c;
            --primary-teal: #0f766e;
            --primary-cyan: #0e7490;
            --primary-yellow: #a16207;
            --primary-indigo: #4338ca;
        }

        [data-theme="light"] {
            --bg-dark: #E4E1D9;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-dim: #64748b;
            --page-bg: #E4E1D9;
            --nav-bg: rgba(255, 255, 255, 0.6);

            --glass-bg: rgba(0, 0, 0, 0.02);
            --glass-border: rgba(0, 0, 0, 0.05);
            --glass-bg-hover: rgba(0, 0, 0, 0.04);
            --glass-border-hover: rgba(0, 0, 0, 0.1);

            --input-bg: rgba(255, 255, 255, 0.7);
            --input-border: rgba(0, 0, 0, 0.1);
            --input-bg-hover: rgba(255, 255, 255, 1);
            --input-border-hover: rgba(0, 0, 0, 0.2);
            --input-bg-focus: #fff;

            --btn-ghost-bg: rgba(0, 0, 0, 0.05);
            --btn-ghost-border: rgba(0, 0, 0, 0.1);
            --btn-ghost-hover: rgba(0, 0, 0, 0.08);
            --btn-ghost-hover-border: rgba(0, 0, 0, 0.15);

            --title-grad-start: #1e3a8a;
            --title-grad-end: #2563eb;

            --modal-bg-grad: linear-gradient(135deg, #ffffff, #f8fafc);
            --modal-overlay: rgba(255, 255, 255, 0.4);
            --shadow-color: rgba(0, 0, 0, 0.05);
            --grid-line-color: rgba(0, 0, 0, 0.05);
            --border-color: rgba(0, 0, 0, 0.1);
            --scrollbar-thumb: rgba(0, 0, 0, 0.15);
            --scrollbar-thumb-hover: rgba(0, 0, 0, 0.25);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--page-bg);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .top-navbar {
            height: 56px;
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 40px;
            gap: 12px;
            flex-shrink: 0;
            z-index: 100;
        }

        .nav-btn {
            background: var(--btn-ghost-bg);
            border: 1px solid var(--btn-ghost-border);
            color: var(--text-main);
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }

        .nav-btn:hover {
            background: var(--btn-ghost-hover);
            border-color: var(--btn-ghost-hover-border);
            transform: translateY(-1px);
        }

        .nav-btn:active {
            transform: translateY(0);
        }

        .simulator-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            width: 100%;
            flex: 1;
            min-height: 0;
            padding: 30px 40px;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
            border: none;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .simulator-card {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }

        /* Common Editable Box Style */
        .editable-box {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            padding: 4px 8px;
            outline: none;
            transition: all 0.2s;
            cursor: text;
            display: inline-block;
            color: inherit;
            font-family: inherit;
        }

        .editable-box:hover {
            background: var(--input-bg-hover);
            border-color: var(--input-border-hover);
        }

        .editable-box:focus {
            border-color: var(--primary-blue);
            background: var(--input-bg-focus);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        /* Title Area */
        .title-area h1 {
            font-size: 28px;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--title-grad-start), var(--title-grad-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Top Header Stats */
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 20px;
        }

        .stats-area {
            display: flex;
            gap: 30px;
        }

        .stat-box {
            text-align: left;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
        }

        .form-group label {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
            width: 100%;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: var(--input-bg-hover);
        }

        .btn {
            background: var(--primary-blue);
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        .task-list {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding-right: 5px;
        }

        .task-list.is-dragging .task-item * {
            pointer-events: none;
        }

        .task-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s, border-color 0.2s;
        }

        .task-item:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
        }

        .task-item-delete {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid transparent;
            border-radius: 8px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .task-item-delete:hover {
            background: #ef4444;
            color: white;
        }

        /* Inline Input matches editable-box mapping nicely */
        .inline-input {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: inherit;
            font-family: inherit;
            outline: none;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .inline-input:hover {
            background: rgba(0, 0, 0, 0.3);
            border-color: var(--btn-ghost-hover-border);
        }

        .inline-input:focus {
            border-color: var(--primary-blue);
            background: var(--input-bg-hover);
            box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.3);
        }

        /* Right Side: Chart Area */
        .chart-panel {
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
        }

        .chart-container {
            position: relative;
            flex: 1;
            min-height: 0;
            margin-top: 10px;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100%;
            box-sizing: border-box;
        }

        #timeline-header {
            flex-shrink: 0;
            position: relative;
            height: 75px;
            width: 100%;
            border-bottom: 1px solid var(--border-color);
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 50;
            overflow: hidden;
        }

        #chart-scroll {
            flex: 1;
            min-height: 0;
            overflow-x: auto;
            overflow-y: auto;
        }

        .chart-inner {
            position: relative;
            min-width: 100%;
            min-height: 100%;
            height: max-content;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            box-sizing: border-box;
            padding-bottom: 40px;
        }

        .grid-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            border-left: 1px dashed var(--grid-line-color);
            z-index: 1;
        }

        /* Task Bars */
        .task-row {
            position: relative;
            width: 100%;
            min-height: 52px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            padding: 8px 0;
        }

        .task-bar {
            min-height: 32px;
            border-radius: 8px;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            line-height: 1.4;
            word-break: break-word;
            white-space: pre-wrap;
            box-sizing: border-box;
            flex-shrink: 0;
            overflow: hidden;
            color: #ffffff;
            text-shadow: 0 1px 2px var(--shadow-color);
            box-shadow: 0 4px 12px var(--shadow-color);
            border: 1px solid var(--glass-border-hover);
            cursor: pointer;
            user-select: none;
        }

        .task-bar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px var(--shadow-color);
            border-color: var(--input-border-hover);
            z-index: 5;
        }

        .task-bar:active {
            transform: translateY(0);
        }

        .month-labels, #week-labels {
            position: absolute;
            left: 0;
            width: 100%;
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            box-sizing: border-box;
        }

        .month-labels {
            top: 0px;
            height: 30px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 700;
        }

        #week-labels {
            top: 35px;
            height: 40px;
        }
    </style>
    <!-- Include html2canvas for extracting DOM components -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

    <div class="top-navbar">
        <input type="file" id="import-file-input" style="display: none;" accept=".db,.json"
            onchange="importDBFile(event)">
        <button class="nav-btn" onclick="location.reload()">🏠 Home</button>
        <button class="nav-btn" onclick="triggerImport()">📥 Import DB</button>
        <button class="nav-btn" onclick="exportDBFile()">📤 Export DB</button>
        <button class="nav-btn" onclick="exportChartAsPNG()">📷 Export PNG</button>
        <button class="nav-btn" onclick="randomizeColors()">🎨 Randomize Colors</button>

        <div
            style="display: flex; align-items: center; gap: 4px; border: 1px solid var(--btn-ghost-border); padding: 4px 8px; border-radius: 8px; margin-left: 12px; background: var(--input-bg);">
            <select id="fs-target" onchange="updateFontSizeDisplay()"
                style="background: transparent; border: none; color: var(--text-main); font-size: 13px; font-weight: 600; outline: none; cursor: pointer;">
                <option value="task" style="background: var(--bg-dark);">📝 Task Size</option>
                <option value="title" style="background: var(--bg-dark);">📌 Title Size</option>
            </select>
            <button onclick="changeFontSize(-1)"
                style="background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 4px; color: var(--text-main); cursor: pointer; font-weight: bold; font-size: 12px; padding: 2px 6px; margin-left: 4px;"
                title="Decrease font size">-</button>
            <span id="fs-display"
                style="color: var(--text-main); font-size: 13px; font-weight: bold; min-width: 18px; text-align: center;">12</span>
            <button onclick="changeFontSize(1)"
                style="background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 4px; color: var(--text-main); cursor: pointer; font-weight: bold; font-size: 12px; padding: 2px 6px;"
                title="Increase font size">+</button>
        </div>

        <div
            style="display: flex; align-items: center; gap: 4px; border: 1px solid var(--btn-ghost-border); padding: 4px 8px; border-radius: 8px; margin-left: 12px; background: var(--input-bg);">
            <span style="color: var(--text-dim); font-size: 13px; font-weight: 600;">🔍 Zoom</span>
            <button onclick="changeZoom(-0.2)"
                style="background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 4px; color: var(--text-main); cursor: pointer; font-weight: bold; font-size: 12px; padding: 2px 6px; margin-left: 4px;"
                title="Zoom Out">-</button>
            <span id="zoom-display"
                style="color: var(--text-main); font-size: 13px; font-weight: bold; min-width: 38px; text-align: center;">100%</span>
            <button onclick="changeZoom(0.2)"
                style="background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 4px; color: var(--text-main); cursor: pointer; font-weight: bold; font-size: 12px; padding: 2px 6px;"
                title="Zoom In">+</button>
        </div>

        <button class="nav-btn" style="margin-left: auto;" onclick="openAboutModal()">ℹ️ About</button>
        <button class="nav-btn" onclick="toggleTheme()" id="theme-toggle">☀️ White Theme</button>
    </div>

    <div class="simulator-card">
        <div class="header">
            <div class="title-area" style="display: flex; flex-direction: column; gap: 10px; align-items: flex-start;">
                <h1 id="project-title" contenteditable="true" spellcheck="false" class="editable-box">Gantt Chart Maker
                </h1>
                <p id="project-subtitle" contenteditable="true" spellcheck="false" class="editable-box"
                    style="margin: 0; color: var(--text-dim); font-size: 14px;">Create dynamic project timelines
                    instantly.</p>
            </div>
            <div class="stats-area">
                <div class="stat-box">
                    <div id="label-total-tasks" class="stat-label editable-box" contenteditable="true"
                        spellcheck="false" style="margin-bottom: 5px;">Total Tasks</div>
                    <div class="stat-value editable-box" id="total-tasks" contenteditable="true" spellcheck="false"
                        style="display: block;">0</div>
                </div>
                <div class="stat-box">
                    <div id="label-total-weeks" class="stat-label editable-box" contenteditable="true"
                        spellcheck="false" style="margin-bottom: 5px;">Chart Scope</div>
                    <div class="stat-value">
                        <input type="number" id="custom-total-weeks" value="26" min="1" class="editable-box"
                            title="Visual chart width in weeks" onchange="updateChart()"
                            style="width: 60px; text-align: center; font-size: 18px; font-weight: bold;">
                        <span id="label-wks" class="editable-box" contenteditable="true" spellcheck="false"
                            style="font-size: 14px; color: var(--text-dim); font-weight: bold; margin-left: 5px;">Wks</span>
                    </div>
                </div>
                <div class="stat-box">
                    <div id="label-project-time" class="stat-label editable-box" contenteditable="true"
                        spellcheck="false" style="margin-bottom: 5px;">Project Time</div>
                    <div class="stat-value editable-box" id="real-total-weeks" contenteditable="true" spellcheck="false"
                        style="display: block; font-weight: 800; color: var(--primary-blue);">0 Wks</div>
                </div>
            </div>
        </div>

        <div class="controls-panel">
            <div class="form-group">
                <label id="label-task-name" class="editable-box" contenteditable="true" spellcheck="false">Task
                    Name</label>
                <input type="text" id="input-name" placeholder="E.g. Strategy Formulation">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label id="label-start-week" class="editable-box" contenteditable="true" spellcheck="false">Start
                        (Week)</label>
                    <input type="number" id="input-start" value="0" min="0">
                </div>
                <div class="form-group">
                    <label id="label-duration" class="editable-box" contenteditable="true" spellcheck="false">Duration
                        (Wks)</label>
                    <input type="number" id="input-dur" value="2" min="1">
                </div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group">
                    <label class="editable-box" contenteditable="true" spellcheck="false">Type</label>
                    <select id="input-type">
                        <option value="task">📝 Task</option>
                        <option value="title">📌 Title Header</option>
                    </select>
                </div>
                <div class="form-group">
                    <label id="label-color" class="editable-box" contenteditable="true" spellcheck="false">Color</label>
                    <select id="input-color">
                        <option value="var(--primary-blue)">🔵 Blue</option>
                        <option value="var(--primary-green)">🟢 Green</option>
                        <option value="var(--primary-orange)">🟠 Orange</option>
                        <option value="var(--primary-pink)">🩷 Pink</option>
                        <option value="var(--primary-purple)">🟣 Purple</option>
                        <option value="var(--primary-red)">🔴 Red</option>
                        <option value="var(--primary-teal)">🌱 Teal</option>
                        <option value="var(--primary-cyan)">🩵 Cyan</option>
                        <option value="var(--primary-yellow)">🟡 Yellow</option>
                        <option value="var(--primary-indigo)">🌀 Indigo</option>
                    </select>
                </div>
            </div>
            <!-- Add Button -->
            <button class="btn" id="add-task-btn">+ Add Task</button>

            <div id="label-task-list" class="editable-box" contenteditable="true" spellcheck="false"
                style="margin-top: 10px; font-size: 12px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; align-self: flex-start;">
                Task List
            </div>
            <div class="task-list" id="task-list-container">
                <!-- Tasks will appear here -->
            </div>
        </div>

        <div class="chart-panel">
            <div
                style="display: flex; justify-content: flex-start; align-items: center; margin-bottom: 8px; padding: 0 40px;">
                <h2 id="chart-section-title" contenteditable="true" spellcheck="false" class="editable-box"
                    style="margin: 0; font-size: 18px; font-weight: 700; color: var(--text-main);">Project Timeline</h2>
            </div>
            <div class="chart-container" id="chart-container">
                <div id="timeline-header">
                    <div class="month-labels" id="month-labels"
                        style="position: absolute; top: 0; height: 35px; border-bottom: 1px solid var(--glass-border);">
                    </div>
                    <div id="week-labels" style="position: absolute; top: 35px; height: 40px;"></div>
                </div>
                <div id="chart-scroll">
                    <div class="chart-inner" id="chart">
                        <div id="grid-lines"></div>
                        <div id="tasks-container"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Small Floating Notes Tooltip/Window -->
    <div id="notes-modal"
        style="display: none; position: fixed; z-index: 1000; background: var(--card-bg); padding: 16px; border-radius: 12px; width: 340px; box-sizing: border-box; border: 1px solid var(--glass-border); box-shadow: 0 10px 40px var(--shadow-color); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px;">
            <input type="text" id="notes-modal-title"
                style="flex: 1; margin: 0; font-size: 14px; font-weight: 700; color: var(--text-main); background: var(--input-bg); border: 1px solid var(--btn-ghost-border); border-radius: 6px; padding: 6px 10px; outline: none; transition: all 0.2s; box-sizing: border-box;"
                onfocus="this.style.borderColor='var(--primary-blue)'; this.style.background='var(--input-bg-focus)'"
                onblur="this.style.borderColor='var(--input-border)'; this.style.background='var(--input-bg)'">
            <button onclick="closeNotesModal()"
                style="background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 0; line-height: 1; margin-left: 4px;"
                onmouseover="this.style.color='var(--text-main)'"
                onmouseout="this.style.color='var(--text-dim)'">&times;</button>
        </div>
        <textarea id="notes-modal-textarea" placeholder="Add notes here..."
            style="width: 100%; height: 90px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-main); padding: 10px; border-radius: 8px; font-family: inherit; font-size: 13px; resize: none; margin-bottom: 12px; box-sizing: border-box; outline: none; transition: border-color 0.2s;"
            onfocus="this.style.borderColor='var(--primary-blue)'; this.style.background='var(--input-bg-focus)'"
            onblur="this.style.borderColor='var(--input-border)'; this.style.background='var(--input-bg)'"></textarea>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;">
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <label style="font-size: 11px; color: var(--text-dim); font-weight: 600;">Start (Wk)</label>
                <input type="number" id="notes-modal-start" min="0"
                    style="width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-main); border-radius: 6px; padding: 6px 8px; outline: none; font-size: 12px; box-sizing: border-box;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <label style="font-size: 11px; color: var(--text-dim); font-weight: 600;">Duration</label>
                <input type="number" id="notes-modal-dur" min="1"
                    style="width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-main); border-radius: 6px; padding: 6px 8px; outline: none; font-size: 12px; box-sizing: border-box;">
            </div>
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <label style="font-size: 11px; color: var(--text-dim); font-weight: 600;">Type</label>
                <select id="notes-modal-type"
                    style="width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-main); border-radius: 6px; padding: 6px; outline: none; font-size: 12px; box-sizing: border-box;">
                    <option style="background: var(--bg-dark);" value="task">📝 Task</option>
                    <option style="background: var(--bg-dark);" value="title">📌 Title</option>
                </select>
            </div>
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <label style="font-size: 11px; color: var(--text-dim); font-weight: 600;">Color</label>
                <select id="notes-modal-color"
                    style="width: 100%; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--text-main); border-radius: 6px; padding: 6px; outline: none; font-size: 12px; box-sizing: border-box;">
                    <option style="background: var(--bg-dark);" value="var(--primary-blue)">🔵 Blue</option>
                    <option style="background: var(--bg-dark);" value="var(--primary-green)">🟢 Green</option>
                    <option style="background: var(--bg-dark);" value="var(--primary-orange)">🟠 Orange</option>
                    <option style="background: var(--bg-dark);" value="var(--primary-pink)">🩷 Pink</option>
                    <option style="background: var(--bg-dark);" value="var(--primary-purple)">🟣 Purple</option>
                    <option style="background: var(--bg-dark);" value="var(--primary-red)">🔴 Red</option>
                    <option style="background: var(--bg-dark);" value="var(--primary-teal)">🌱 Teal</option>
                    <option style="background: var(--bg-dark);" value="var(--primary-cyan)">🩵 Cyan</option>
                    <option style="background: var(--bg-dark);" value="var(--primary-yellow)">🟡 Yellow</option>
                    <option style="background: var(--bg-dark);" value="var(--primary-indigo)">🌀 Indigo</option>
                </select>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end;">
            <button onclick="saveNotes()" class="btn"
                style="width: auto; padding: 6px 14px; font-size: 13px; transform: none;">Save Changes</button>
        </div>
    </div>

    <script>
        const tasksContainer = document.getElementById('tasks-container');
        const taskListContainer = document.getElementById('task-list-container');
        const gridLines = document.getElementById('grid-lines');
        const monthLabels = document.getElementById('month-labels');
        const chartInner = document.getElementById('chart');
        const totalWeeksInput = document.getElementById('custom-total-weeks');

        let tasksData = [];
        let nextId = 1;
        let currentNoteTaskId = null;

        function openNotesModal(taskId, event) {
            const task = tasksData.find(t => t.id === taskId);
            if (!task) return;
            currentNoteTaskId = taskId;
            document.getElementById('notes-modal-title').value = task.name;
            document.getElementById('notes-modal-textarea').value = task.notes || '';
            document.getElementById('notes-modal-start').value = task.start;
            document.getElementById('notes-modal-dur').value = task.dur;
            document.getElementById('notes-modal-type').value = task.type || 'task';
            document.getElementById('notes-modal-color').value = task.color;

            const modal = document.getElementById('notes-modal');
            modal.style.display = 'block';

            let left = event.clientX + 15;
            let top = event.clientY + 15;

            if (left + 320 > window.innerWidth) left = window.innerWidth - 340;
            if (top + 220 > window.innerHeight) top = event.clientY - 230;

            modal.style.left = left + 'px';
            modal.style.top = top + 'px';

            setTimeout(() => document.getElementById('notes-modal-textarea').focus(), 50);
        }

        function closeNotesModal() {
            document.getElementById('notes-modal').style.display = 'none';
            currentNoteTaskId = null;
        }

        function saveNotes() {
            if (currentNoteTaskId !== null) {
                const task = tasksData.find(t => t.id === currentNoteTaskId);
                if (task) {
                    task.name = document.getElementById('notes-modal-title').value.trim() || 'Untitled Task';
                    task.notes = document.getElementById('notes-modal-textarea').value;
                    task.start = Math.max(0, parseInt(document.getElementById('notes-modal-start').value) || 0);
                    task.dur = Math.max(1, parseInt(document.getElementById('notes-modal-dur').value) || 1);
                    task.type = document.getElementById('notes-modal-type').value;
                    task.color = document.getElementById('notes-modal-color').value;
                }
            }
            closeNotesModal();
            updateChart();
        }

        function updateTask(id, field, value) {
            const task = tasksData.find(t => t.id === id);
            if (task) {
                if (field === 'start' || field === 'dur') {
                    task[field] = parseInt(value) || (field === 'dur' ? 1 : 0);
                } else {
                    task[field] = value;
                }
                updateChart();
            }
        }

        document.getElementById('add-task-btn').addEventListener('click', function (e) {
            addTask();
        });

        function renderTasksList() {
            taskListContainer.innerHTML = '';
            tasksData.forEach(task => {
                const el = document.createElement('div');
                el.className = 'task-item';

                el.ondragstart = (e) => {
                    e.dataTransfer.setData('text/plain', task.id);
                    setTimeout(() => {
                        el.style.opacity = '0.4';
                        taskListContainer.classList.add('is-dragging');
                    }, 0);
                };

                el.ondragend = () => {
                    el.style.opacity = '1';
                    el.removeAttribute('draggable');
                    taskListContainer.classList.remove('is-dragging');
                    document.querySelectorAll('.task-item').forEach(item => item.style.boxShadow = '');
                };

                el.ondragover = (e) => {
                    e.preventDefault();
                    if (e.dataTransfer.types.includes('text/plain')) {
                        const rect = el.getBoundingClientRect();
                        const midY = rect.top + rect.height / 2;
                        el.style.boxShadow = e.clientY < midY ? '0 -2px 0 var(--primary-blue)' : '0 2px 0 var(--primary-blue)';
                    }
                };

                el.ondragleave = () => {
                    el.style.boxShadow = '';
                };

                el.ondrop = (e) => {
                    e.preventDefault();
                    el.style.boxShadow = '';
                    const draggedId = parseInt(e.dataTransfer.getData('text/plain'));
                    if (draggedId && draggedId !== task.id) {
                        const draggedIndex = tasksData.findIndex(t => t.id === draggedId);
                        let targetIndex = tasksData.findIndex(t => t.id === task.id);
                        if (draggedIndex !== -1 && targetIndex !== -1) {
                            const rect = el.getBoundingClientRect();
                            if (e.clientY > rect.top + rect.height / 2) targetIndex++;
                            if (draggedIndex < targetIndex) targetIndex--;
                            const [movedTask] = tasksData.splice(draggedIndex, 1);
                            tasksData.splice(targetIndex, 0, movedTask);
                            updateChart();
                        }
                    }
                };

                el.innerHTML = `
                <div class="grab-handle" onmousedown="this.parentElement.setAttribute('draggable', true)" onmouseup="this.parentElement.removeAttribute('draggable')" style="cursor: grab; color: var(--text-dim); padding-right: 10px; font-weight: bold; font-size: 16px; user-select: none; display: flex; align-items: center;" title="Drag to reorder">&#x28FF;</div>
                <div class="task-item-info" style="flex: 1; margin-right: 12px; min-width: 0;">
                    <input type="text" class="inline-input" value="${task.name.replace(/"/g, '&quot;')}" onchange="updateTask(${task.id}, 'name', this.value)" style="color: ${task.color}; font-size: 13px; font-weight: 700; width: 100%; margin-bottom: 4px; text-overflow: ellipsis;">
                    <div style="display: flex; gap: 8px; font-size: 11px; color: var(--text-dim); align-items: center; flex-wrap: wrap;">
                        <span style="white-space: nowrap; display: flex; align-items: center; gap: 4px;" class="editable-box" contenteditable="true" spellcheck="false">
                            Wk <input type="number" class="inline-input" value="${task.start}" min="0" onchange="updateTask(${task.id}, 'start', this.value)" style="width: 45px; color: var(--text-main); display: inline-block;">
                        </span>
                        <span style="white-space: nowrap;" class="editable-box" contenteditable="true" spellcheck="false">
                            - Wk ${task.start + task.dur}
                        </span>
                        <span style="white-space: nowrap; display: flex; align-items: center; gap: 4px;" class="editable-box" contenteditable="true" spellcheck="false">
                            (<input type="number" class="inline-input" value="${task.dur}" min="1" onchange="updateTask(${task.id}, 'dur', this.value)" style="width: 45px; color: var(--text-main); display: inline-block;"> wks)
                        </span>
                        <select class="inline-input" onchange="updateTask(${task.id}, 'type', this.value)" style="margin-left: auto; color: var(--text-main); cursor: pointer; max-width: 80px;">
                            <option value="task" ${task.type !== 'title' ? 'selected' : ''}>📝 Task</option>
                            <option value="title" ${task.type === 'title' ? 'selected' : ''}>📌 Title</option>
                        </select>
                        <select class="inline-input" onchange="updateTask(${task.id}, 'color', this.value)" style="margin-left: 6px; color: var(--text-main); cursor: pointer;">
                            <option style="background: var(--bg-dark);" value="var(--primary-blue)" ${task.color === 'var(--primary-blue)' ? 'selected' : ''}>🔵 Blue</option>
                            <option style="background: var(--bg-dark);" value="var(--primary-green)" ${task.color === 'var(--primary-green)' ? 'selected' : ''}>🟢 Green</option>
                            <option style="background: var(--bg-dark);" value="var(--primary-orange)" ${task.color === 'var(--primary-orange)' ? 'selected' : ''}>🟠 Orange</option>
                            <option style="background: var(--bg-dark);" value="var(--primary-pink)" ${task.color === 'var(--primary-pink)' ? 'selected' : ''}>🩷 Pink</option>
                            <option style="background: var(--bg-dark);" value="var(--primary-purple)" ${task.color === 'var(--primary-purple)' ? 'selected' : ''}>🟣 Purple</option>
                            <option style="background: var(--bg-dark);" value="var(--primary-red)" ${task.color === 'var(--primary-red)' ? 'selected' : ''}>🔴 Red</option>
                            <option style="background: var(--bg-dark);" value="var(--primary-teal)" ${task.color === 'var(--primary-teal)' ? 'selected' : ''}>🌱 Teal</option>
                            <option style="background: var(--bg-dark);" value="var(--primary-cyan)" ${task.color === 'var(--primary-cyan)' ? 'selected' : ''}>🩵 Cyan</option>
                            <option style="background: var(--bg-dark);" value="var(--primary-yellow)" ${task.color === 'var(--primary-yellow)' ? 'selected' : ''}>🟡 Yellow</option>
                            <option style="background: var(--bg-dark);" value="var(--primary-indigo)" ${task.color === 'var(--primary-indigo)' ? 'selected' : ''}>🌀 Indigo</option>
                        </select>
                    </div>
                    ${task.notes && task.notes.trim() ? `
                    <div style="margin-top: 8px; font-size: 11px; color: var(--text-dim); background: var(--glass-bg); padding: 6px 8px; border-radius: 6px; border: 1px solid var(--glass-border); line-height: 1.4; word-break: break-word; cursor: pointer;" title="Click colored bar on the timeline to edit this note" onclick="openNotesModal(${task.id}, event)">
                        <span style="opacity: 0.7;">📝</span> <i style="margin-left: 2px;">${task.notes.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</i>
                    </div>` : ''}
                </div>
                <button class="task-item-delete" title="Delete Task" onclick="deleteTask(${task.id})">&times;</button>
            `;
                taskListContainer.appendChild(el);
            });
        }

        function addTask() {
            const nameNode = document.getElementById('input-name');
            const startNode = document.getElementById('input-start');
            const durNode = document.getElementById('input-dur');
            const colorNode = document.getElementById('input-color');
            const typeNode = document.getElementById('input-type');

            const name = nameNode.value.trim() || 'Untitled Task';
            const start = Math.max(0, parseInt(startNode.value) || 0);
            const dur = parseInt(durNode.value) || 1;
            const color = colorNode.value;
            const type = typeNode ? typeNode.value : 'task';

            tasksData.push({ id: nextId++, name, start, dur, color, type, notes: '' });

            nameNode.value = '';
            startNode.value = (start + dur).toString();
            durNode.value = '2';

            updateChart();
        }

        function deleteTask(id) {
            tasksData = tasksData.filter(t => t.id !== id);
            updateChart();
        }

        function updateChart() {
            renderTasksList();

            let maxReach = 0;
            tasksData.forEach(t => {
                maxReach = Math.max(maxReach, t.start + t.dur);
            });

            // Use custom total weeks directly
            let customTotalWeeks = parseInt(totalWeeksInput.value) || 26;
            const chartWeeks = customTotalWeeks;

            const scale = 100 / chartWeeks; // Percent per week

            // Adjust chart width dynamically, scaled by global chart zoom
            const minGridWidth = chartWeeks * 75 * globalChartZoom;
            chartInner.style.minWidth = `max(100%, ${minGridWidth}px)`;
            chartInner.style.width = Math.max(100, (chartWeeks / 15) * 100 * globalChartZoom) + '%';

            // Rebuild Grid and Week Labels
            gridLines.innerHTML = '';
            const weekLabels = document.getElementById('week-labels');
            weekLabels.innerHTML = '';

            // Sync axis container widths with chart width to allow correct scrolling and alignment
            const axisWidth = chartInner.style.width;
            const axisMinWidth = chartInner.style.minWidth;
            weekLabels.style.width = axisWidth;
            weekLabels.style.minWidth = axisMinWidth;
            monthLabels.style.width = axisWidth;
            monthLabels.style.minWidth = axisMinWidth;
            for (let i = 0; i <= chartWeeks; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line';
                line.style.left = (i * scale) + '%';
                gridLines.appendChild(line);

                const wlabel = document.createElement('span');
                wlabel.className = 'editable-box';
                wlabel.style.position = 'absolute';
                wlabel.style.left = (i * scale) + '%';
                wlabel.style.transform = 'translateX(-50%)';
                wlabel.style.fontSize = '12px';
                wlabel.style.fontWeight = '600';
                wlabel.style.color = 'var(--text-dim)';
                wlabel.style.textAlign = 'center';
                wlabel.style.top = '10px';
                wlabel.style.background = 'transparent';
                wlabel.style.whiteSpace = 'nowrap';
                wlabel.style.zIndex = '2';
                wlabel.contentEditable = "true";
                wlabel.spellcheck = false;
                wlabel.innerText = `Wk ${i}`;
                weekLabels.appendChild(wlabel);
            }

            // Rebuild Month Labels
            monthLabels.innerHTML = '';
            const calendarMonths = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            for (let i = 0; i < chartWeeks; i += 4) {
                const monthOffset = Math.floor(i / 4);

                const select = document.createElement('select');
                select.className = 'editable-box';
                select.style.position = 'absolute';
                select.style.left = (i * scale) + '%';
                select.style.width = (Math.min(4, chartWeeks - i) * scale) + '%';
                select.style.textAlign = 'center';
                select.style.textAlignLast = 'center';
                select.style.top = '6px';
                select.style.fontWeight = 'bold';
                select.style.color = 'var(--text-main)';
                select.style.background = 'transparent';
                select.style.border = 'none';
                select.style.outline = 'none';
                select.style.cursor = 'pointer';
                select.style.zIndex = '3';
                select.title = "Select to change starting project month";

                const currentMonthIdx = (globalStartMonth + monthOffset) % 12;

                calendarMonths.forEach((m, idx) => {
                    const opt = document.createElement('option');
                    opt.value = idx;
                    opt.innerText = m;
                    opt.style.background = 'var(--bg-dark)';
                    if (idx === currentMonthIdx) opt.selected = true;
                    select.appendChild(opt);
                });

                select.onchange = (e) => {
                    const chosenIdx = parseInt(e.target.value);
                    let newStart = chosenIdx - monthOffset;
                    while (newStart < 0) newStart += 12;
                    globalStartMonth = newStart % 12;
                    updateChart();
                };

                monthLabels.appendChild(select);
            }

            // Render Tasks
            tasksContainer.innerHTML = '';
            tasksContainer.style.paddingTop = '10px';
            tasksData.forEach((task, index) => {
                const row = document.createElement('div');
                row.className = 'task-row';

                const bar = document.createElement('div');
                bar.className = 'task-bar';
                bar.style.marginLeft = (task.start * scale) + '%';
                bar.style.width = (task.dur * scale) + '%';

                if (task.type === 'title') {
                    bar.style.backgroundColor = 'transparent';
                    bar.style.boxShadow = 'none';
                    bar.style.border = 'none';
                    bar.style.borderBottom = '3px solid ' + task.color;
                    bar.style.color = 'var(--text-main)';
                    bar.style.fontSize = globalTitleFontSize + 'px';
                    bar.style.fontWeight = '800';
                    bar.style.padding = '0 6px';
                    bar.style.borderRadius = '0';
                    bar.style.textTransform = 'uppercase';
                    bar.style.letterSpacing = '1px';
                } else {
                    bar.style.backgroundColor = task.color;
                    bar.style.fontSize = globalTaskFontSize + 'px';
                }

                bar.title = "Drag to move timeline. Drag right edge to resize. Click to edit notes.";

                if (task.notes && task.notes.trim() !== '') {
                    bar.innerHTML = task.name.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') + ' <span style="margin-left: 6px; font-size: 11px;">📝</span>';
                } else {
                    bar.innerText = task.name;
                }

                // --------- DRAG TO MOVE ---------
                let isDragging = false;
                let startX = 0;
                let initialStart = task.start;
                let hasMoved = false;

                bar.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    e.preventDefault();
                    e.stopPropagation();

                    isDragging = true;
                    hasMoved = false;
                    startX = e.pageX;
                    initialStart = task.start;

                    const chartBody = document.getElementById('chart');
                    const weeksTotal = parseInt(document.getElementById('custom-total-weeks').value) || 26;
                    const pixelsPerWeek = chartBody.offsetWidth / weeksTotal;

                    bar.style.transition = 'none';
                    bar.style.zIndex = '100';
                    bar.style.opacity = '0.9';
                    bar.style.cursor = 'grabbing';

                    const onMouseMove = (moveEvent) => {
                        if (!isDragging) return;
                        const deltaX = moveEvent.pageX - startX;
                        if (Math.abs(deltaX) > 5) hasMoved = true;

                        if (moveEvent.altKey) {
                            bar.style.cursor = 'copy';
                        } else {
                            bar.style.cursor = 'grabbing';
                        }

                        let weeksMoved = Math.round(deltaX / pixelsPerWeek);
                        let newStart = Math.max(0, initialStart + weeksMoved);
                        bar.style.marginLeft = (newStart * scale) + '%';
                    };

                    const onMouseUp = (upEvent) => {
                        isDragging = false;
                        bar.style.transition = '';
                        bar.style.zIndex = '';
                        bar.style.opacity = '1';
                        bar.style.cursor = 'pointer';

                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);

                        if (hasMoved) {
                            const deltaX = upEvent.pageX - startX;
                            let weeksMoved = Math.round(deltaX / pixelsPerWeek);
                            let newStart = Math.max(0, initialStart + weeksMoved);

                            if (upEvent.altKey) {
                                tasksData.push({
                                    id: nextId++,
                                    name: task.name + " (Copy)",
                                    start: newStart,
                                    dur: task.dur,
                                    color: task.color,
                                    notes: task.notes
                                });
                                updateChart();
                            } else if (newStart !== task.start) {
                                task.start = newStart;
                                updateChart(); // Re-render updates everything including list texts
                            } else {
                                bar.style.marginLeft = (task.start * scale) + '%';
                            }
                        } else {
                            openNotesModal(task.id, e);
                        }
                    };

                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });

                // --------- DRAG TO RESIZE ---------
                const resizeHandle = document.createElement('div');
                resizeHandle.style.position = 'absolute';
                resizeHandle.style.right = '0';
                resizeHandle.style.top = '0';
                resizeHandle.style.bottom = '0';
                resizeHandle.style.width = '12px';
                resizeHandle.style.cursor = 'ew-resize';
                resizeHandle.style.zIndex = '10';
                resizeHandle.title = "Drag to resize duration";

                resizeHandle.onmouseenter = () => resizeHandle.style.background = 'rgba(255,255,255,0.15)';
                resizeHandle.onmouseleave = () => resizeHandle.style.background = 'transparent';

                resizeHandle.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    e.preventDefault();
                    e.stopPropagation();

                    let isResizing = true;
                    let rStartX = e.pageX;
                    let initialDur = task.dur;

                    const chartBody = document.getElementById('chart');
                    const weeksTotal = parseInt(document.getElementById('custom-total-weeks').value) || 26;
                    const pixelsPerWeek = chartBody.offsetWidth / weeksTotal;

                    bar.style.transition = 'none';

                    const onMouseMove = (moveEvent) => {
                        if (!isResizing) return;
                        const deltaX = moveEvent.pageX - rStartX;
                        let durationDelta = Math.round(deltaX / pixelsPerWeek);
                        let newDur = Math.max(1, initialDur + durationDelta);
                        bar.style.width = (newDur * scale) + '%';
                    };

                    const onMouseUp = (upEvent) => {
                        isResizing = false;
                        bar.style.transition = '';
                        document.removeEventListener('mousemove', onMouseMove);
                        document.removeEventListener('mouseup', onMouseUp);

                        const deltaX = upEvent.pageX - rStartX;
                        let durationDelta = Math.round(deltaX / pixelsPerWeek);
                        let newDur = Math.max(1, initialDur + durationDelta);

                        if (newDur !== task.dur) {
                            task.dur = newDur;
                            updateChart();
                        } else {
                            bar.style.width = (task.dur * scale) + '%';
                        }
                    };

                    document.addEventListener('mousemove', onMouseMove);
                    document.addEventListener('mouseup', onMouseUp);
                });

                bar.appendChild(resizeHandle);

                row.appendChild(bar);
                tasksContainer.appendChild(row);
            });

            // Only update total tasks if the user hasn't typed their own manual override inside it
            const tt = document.getElementById('total-tasks');
            if (tt && !tt.hasAttribute('data-customized')) {
                tt.innerText = tasksData.length;
            }

            const rw = document.getElementById('real-total-weeks');
            if (rw && !rw.hasAttribute('data-customized')) {
                rw.innerText = maxReach + ' Wks';
            }
        }

        const totalTasksEl = document.getElementById('total-tasks');
        if (totalTasksEl) {
            totalTasksEl.addEventListener('input', function () {
                this.setAttribute('data-customized', 'true');
            });
        }

        const realTotalWeeksEl = document.getElementById('real-total-weeks');
        if (realTotalWeeksEl) {
            realTotalWeeksEl.addEventListener('input', function () {
                this.setAttribute('data-customized', 'true');
            });
        }

        function exportChartAsPNG() {
            const chartNode = document.getElementById('chart');
            const originalBg = chartNode.style.background;
            const originalBorderTop = chartNode.style.borderTop;

            // To ensure the PNG has a solid themed background
            const themeBg = document.body.getAttribute('data-theme') === 'light' ? '#E4E1D9' : '#0f172a';
            chartNode.style.background = themeBg;

            // Temporarily insert title and axis so they get cleanly captured in export PNG
            // We use a larger top border to create space for the title + month/week axis
            chartNode.style.borderTop = '130px solid transparent';

            const originalTitleBtn = document.getElementById('chart-section-title');
            const clonedTitle = document.createElement('h2');
            clonedTitle.innerHTML = originalTitleBtn.innerHTML;
            clonedTitle.id = 'temp-export-title';
            clonedTitle.style.cssText = "position: absolute; top: -115px; left: 0px; font-size: 24px; font-weight: 700; color: var(--text-main); margin: 0; z-index: 101;";
            chartNode.appendChild(clonedTitle);

            // Clone Timeline Header (Months and weeks)
            const clonedHeader = document.createElement('div');
            clonedHeader.id = 'temp-export-header';
            // We append to chartNode (chart-inner), which already has 40px side-borders.
            // By setting width: 100% and NO borders on the clonedHeader itself,
            // it naturally occupies the content area and aligns its children correctly.
            clonedHeader.style.cssText = `
                position: absolute; top: -75px; left: 0; 
                width: 100%; height: 75px; border-bottom: 1px solid var(--border-color);
                z-index: 100; overflow: visible;
            `;

            // We iterate and copy labels to ensure selects render their chosen text as spans
            const originalMonths = document.getElementById('month-labels');
            const clonedMonths = document.createElement('div');
            // Remove the 40px borders from the inner spans because the parent (clonedHeader) 
            // is already sitting inside the content area of chart-inner.
            clonedMonths.style.cssText = "position: absolute; top: 0; width: 100%; height: 35px;";
            Array.from(originalMonths.children).forEach(child => {
                const span = document.createElement('span');
                span.className = child.className;
                span.style.cssText = child.style.cssText;
                span.style.background = 'transparent';
                span.style.border = 'none';
                if (child.tagName === 'SELECT') {
                    span.innerText = child.options[child.selectedIndex].text;
                } else {
                    span.innerText = child.innerText;
                }
                clonedMonths.appendChild(span);
            });
            clonedHeader.appendChild(clonedMonths);

            const originalWeeks = document.getElementById('week-labels');
            const clonedWeeks = document.createElement('div');
            clonedWeeks.style.cssText = "position: absolute; top: 35px; width: 100%; height: 40px;";
            Array.from(originalWeeks.children).forEach(child => {
                const span = document.createElement('span');
                span.className = child.className;
                span.style.cssText = child.style.cssText;
                span.style.background = 'transparent';
                span.innerText = child.innerText;
                clonedWeeks.appendChild(span);
            });
            clonedHeader.appendChild(clonedWeeks);
            chartNode.appendChild(clonedHeader);

            const btn = document.querySelector('button[onclick="exportChartAsPNG()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⏳ Exporting...';
            btn.style.pointerEvents = 'none';

            html2canvas(chartNode, {
                backgroundColor: themeBg,
                scale: window.devicePixelRatio > 1 ? window.devicePixelRatio : 2, // High resolution
                logging: false,
                useCORS: true
            }).then(canvas => {
                chartNode.style.background = originalBg;
                chartNode.style.borderTop = originalBorderTop;
                const tmpNode = document.getElementById('temp-export-title');
                if (tmpNode) tmpNode.remove();
                const tmpHeader = document.getElementById('temp-export-header');
                if (tmpHeader) tmpHeader.remove();

                const link = document.createElement('a');
                link.download = 'Gantt_Timeline.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                btn.innerHTML = '✅ Exported!';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.pointerEvents = 'auto';
                }, 2000);
            }).catch(err => {
                console.error('Error taking screenshot:', err);
                chartNode.style.background = originalBg;
                chartNode.style.borderTop = originalBorderTop;
                const tmpNode = document.getElementById('temp-export-title');
                if (tmpNode) tmpNode.remove();
                const tmpHeader = document.getElementById('temp-export-header');
                if (tmpHeader) tmpHeader.remove();
                btn.innerHTML = '❌ Error';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.pointerEvents = 'auto';
                }, 2000);
            });
        }

        function exportDBFile() {
            const staticEditables = [
                'project-title', 'project-subtitle',
                'label-total-tasks', 'total-tasks',
                'label-total-weeks', 'label-wks',
                'label-task-name', 'label-start-week',
                'label-duration', 'label-color', 'label-task-list',
                'chart-section-title'
            ];
            const editablesData = {};
            staticEditables.forEach(id => {
                const el = document.getElementById(id);
                if (el) editablesData[id] = el.innerHTML;
            });

            const data = {
                totalWeeks: document.getElementById('custom-total-weeks').value,
                tasksData: tasksData,
                editablesData: editablesData,
                settings: {
                    startMonth: globalStartMonth,
                    chartZoom: globalChartZoom,
                    taskFontSize: globalTaskFontSize,
                    titleFontSize: globalTitleFontSize,
                    theme: document.body.getAttribute('data-theme') || 'dark'
                }
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'gantt_data.db';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function triggerImport() {
            document.getElementById('import-file-input').click();
        }

        function importDBFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = JSON.parse(e.target.result);

                    if (data.totalWeeks !== undefined) {
                        document.getElementById('custom-total-weeks').value = data.totalWeeks;
                    }
                    if (data.tasksData && Array.isArray(data.tasksData)) {
                        tasksData = data.tasksData;
                        let maxId = 0;
                        tasksData.forEach(task => { if (task.id > maxId) maxId = task.id; });
                        nextId = maxId + 1;
                    }

                    // Restore all saved settings
                    if (data.settings) {
                        const s = data.settings;
                        if (s.startMonth !== undefined) globalStartMonth = s.startMonth;
                        if (s.chartZoom !== undefined) {
                            globalChartZoom = s.chartZoom;
                            const zd = document.getElementById('zoom-display');
                            if (zd) zd.innerText = Math.round(globalChartZoom * 100) + '%';
                        }
                        if (s.taskFontSize !== undefined) globalTaskFontSize = s.taskFontSize;
                        if (s.titleFontSize !== undefined) globalTitleFontSize = s.titleFontSize;
                        if (s.theme === 'light') {
                            document.body.setAttribute('data-theme', 'light');
                            const btn = document.getElementById('theme-toggle');
                            if (btn) btn.innerHTML = '🌙 Dark Theme';
                        } else {
                            document.body.removeAttribute('data-theme');
                            const btn = document.getElementById('theme-toggle');
                            if (btn) btn.innerHTML = '☀️ White Theme';
                        }
                        // Sync font size display to whichever target is currently selected
                        updateFontSizeDisplay();
                    }

                    // Must update chart to redraw UI based on changed state
                    updateChart();

                    if (data.editablesData) {
                        Object.keys(data.editablesData).forEach(id => {
                            const el = document.getElementById(id);
                            if (el) {
                                el.innerHTML = data.editablesData[id];
                                if (id === 'total-tasks') {
                                    el.setAttribute('data-customized', 'true');
                                }
                            }
                        });
                    }
                } catch (err) {
                    console.error('Error importing file:', err);
                    alert('Invalid database file.');
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function randomizeColors() {
            const colors = [
                'var(--primary-blue)', 'var(--primary-green)', 'var(--primary-orange)',
                'var(--primary-pink)', 'var(--primary-purple)', 'var(--primary-red)',
                'var(--primary-teal)', 'var(--primary-cyan)', 'var(--primary-yellow)',
                'var(--primary-indigo)'
            ];
            tasksData.forEach(task => {
                task.color = colors[Math.floor(Math.random() * colors.length)];
            });
            updateChart();
        }

        let globalChartZoom = 1.0;
        let globalStartMonth = 0; // 0 = January

        function changeZoom(delta) {
            globalChartZoom = Math.max(0.4, Math.min(5.0, globalChartZoom + delta));
            document.getElementById('zoom-display').innerText = Math.round(globalChartZoom * 100) + '%';
            updateChart();
        }

        let globalTaskFontSize = 12;
        let globalTitleFontSize = 14;

        function updateFontSizeDisplay() {
            const target = document.getElementById('fs-target').value;
            document.getElementById('fs-display').innerText = target === 'task' ? globalTaskFontSize : globalTitleFontSize;
        }

        function changeFontSize(delta) {
            const target = document.getElementById('fs-target').value;
            if (target === 'task') {
                globalTaskFontSize = Math.max(8, Math.min(48, globalTaskFontSize + delta));
            } else {
                globalTitleFontSize = Math.max(8, Math.min(48, globalTitleFontSize + delta));
            }
            updateFontSizeDisplay();
            updateChart();
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle');
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                btn.innerHTML = '☀️ White Theme';
            } else {
                body.setAttribute('data-theme', 'light');
                btn.innerHTML = '🌙 Dark Theme';
            }
            updateChart(); // redraw inline colors relying on theme variables if any
        }

        // Sync horizontal scroll: when chart-scroll scrolls left/right, mirror it in the timeline-header
        const chartScroll = document.getElementById('chart-scroll');
        const timelineHeader = document.getElementById('timeline-header');
        if (chartScroll && timelineHeader) {
            chartScroll.addEventListener('scroll', () => {
                timelineHeader.scrollLeft = chartScroll.scrollLeft;
            });
        }

        // Add chart drag-to-draw listener to create new tasks natively
        chartInner.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            // Ignore if clicking on an existing bar or handles, or gridlines
            if (e.target.closest('.task-bar') || e.target.closest('.grid-line') || e.target.closest('.month-labels')) return;

            const rect = chartInner.getBoundingClientRect();
            const startX = e.clientX - rect.left;

            const weeksTotal = parseInt(document.getElementById('custom-total-weeks').value) || 26;
            const pixelsPerWeek = chartInner.offsetWidth / weeksTotal;

            const startWeek = Math.max(0, Math.floor(startX / pixelsPerWeek));

            const ghost = document.createElement('div');
            ghost.className = 'task-bar';
            ghost.style.position = 'absolute';
            ghost.style.opacity = '0.5';
            ghost.style.marginLeft = (startWeek * (100 / weeksTotal)) + '%';
            ghost.style.top = (e.clientY - rect.top - 16) + 'px';
            ghost.style.width = '0%';
            ghost.style.backgroundColor = 'var(--primary-blue)';
            ghost.innerText = 'New Task...';
            ghost.style.pointerEvents = 'none';
            chartInner.appendChild(ghost);

            let isDrawing = true;

            const onMouseMove = (moveEvent) => {
                if (!isDrawing) return;
                const currentX = moveEvent.clientX - rect.left;
                const widthPixels = Math.max(0, currentX - startX);
                const durWeeks = Math.max(1, Math.round(widthPixels / pixelsPerWeek));
                ghost.style.width = (durWeeks * (100 / weeksTotal)) + '%';
            };

            const onMouseUp = (upEvent) => {
                isDrawing = false;
                document.removeEventListener('mousemove', onMouseMove);
                document.removeEventListener('mouseup', onMouseUp);

                ghost.remove();

                const currentX = upEvent.clientX - rect.left;
                if (Math.abs(currentX - startX) > 10) {
                    const widthPixels = Math.max(0, currentX - startX);
                    const durWeeks = Math.max(1, Math.round(widthPixels / pixelsPerWeek));

                    tasksData.push({
                        id: nextId++,
                        name: 'New Custom Task',
                        start: startWeek,
                        dur: durWeeks,
                        color: 'var(--primary-blue)',
                        notes: ''
                    });
                    updateChart();
                }
            };

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });

        // Close and save notes modal when clicking outside
        document.addEventListener('mousedown', (e) => {
            const modal = document.getElementById('notes-modal');
            if (modal.style.display === 'block') {
                if (!modal.contains(e.target) && !e.target.closest('.task-bar')) {
                    saveNotes();
                }
            }
        });

        // Init
        updateChart();
    </script>
